# Basic Site Settings
locale                   : "en-US"
site_theme               : "default"
title                    : "Stephanie H. Stack"
title_separator          : "-"
name                     : &name "Stephanie H. Stack"
description              : &description "Marine mammalogist specialising in humpback whale ecology, energetics, and conservation"
url                      : https://stephaniestack.github.io
baseurl                  : ""
repository               : "stephaniestack/stephaniestack.github.io"

# Site Author
author:
  avatar           : "profile.png"
  name             : "Stephanie H. Stack"
  pronouns         : "she/her"
  bio              : "Marine mammalogist | Humpback whale behavioural ecology & energetics | UAV photogrammetry | Conservation science"
  location         : "Queensland, Australia"
  employer         : "Griffith University"
  uri              :
  email            : "stephanie@saltwaterscience.org"

  # Academic websites
  googlescholar    : "https://scholar.google.com/citations?user=pSA-V4UAAAAJ&hl=en"
  orcid            : "https://orcid.org/0000-0002-7199-8408"
  researchgate     : # Add your ResearchGate URL

  # Repositories and software development
  github           : "stephaniestack"

  # Social media
  bluesky          : # Add your Bluesky handle if applicable
  twitter          : # Add your X/Twitter handle if applicable
  instagram        : # Add if applicable

# Publication Categories
publication_category:
  books:
    title: 'Books'
  manuscripts:
    title: 'Journal Articles'
  conferences:
    title: 'Conference Papers'

# Site Settings
teaser                   :
breadcrumbs              : false
words_per_minute         : 160
future                   : true
read_more                : "disabled"
talkmap_link             : false
comments:
  provider               : false

atom_feed:
  hide                   : false
  path                   :

# SEO Related
google_site_verification :
bing_site_verification   :

# Social Sharing
twitter:
  username               :
facebook:
  username               :
og_image                 :
social:
  type                   : Person
  name                   : Stephanie H. Stack
  links:
    - "https://orcid.org/0000-0002-7199-8408"
    - "https://github.com/stephaniestack"

# Analytics
analytics:
  provider               : "false"

# Reading Files
include:
  - .htaccess
  - _pages
  - files
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .github
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - CHANGELOG
  - Capfile
  - config
  - Dockerfile
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - local
  - log
  - node_modules
  - package.json*
  - Rakefile
  - README
  - tmp
  - vendor
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Collections
collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: teaching
    values:
      layout: single
      author_profile: true
      share: true
      comments: true
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
      share: true
      comments: true
  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: true
      share: true
      comment: true
  - scope:
      path: ""
      type: talks
    values:
      layout: talk
      author_profile: true
      share: true

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed

# Outputting
permalink: /:categories/:title/
timezone: Australia/Brisbane

# Plugins
plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

whitelist:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

compress_html:
  clippings: all
  ignore:
    envs: development
